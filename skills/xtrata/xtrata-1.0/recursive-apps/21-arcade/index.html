<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Arcade</title>
<link rel="stylesheet" href="styles.css?v=wallet-debug-2026-02-20-07">
</head>
<body>
<div id="top-bar">
  <span id="title">Retro Arcade</span>
  <div id="top-bar-right">
    <span id="wallet-status-badge" class="wallet-status-badge is-loading" aria-live="polite">Wallet: checking...</span>
    <button id="wallet-connect-btn" title="Connect wallet">Connect</button>
    <button id="wallet-disconnect-btn" title="Disconnect wallet" style="display:none;">Disconnect</button>
    <button id="force-next-wave-btn" title="Force next wave/level for testing" style="display:none;">Next Wave</button>
    <button id="sound-toggle" title="Toggle Sound">🔊</button>
    <button id="exit-btn" style="display:none;">Exit to Arcade</button>
  </div>
</div>
<div id="app">
  <div id="home-grid"></div>
  <div id="game-container" style="display:none;"></div>
</div>
<div id="error-overlay" style="display:none;">
  <div id="error-box">
    <h2>Game Error</h2>
    <p id="error-msg"></p>
    <button id="error-close">Return to Arcade</button>
  </div>
</div>
<div id="admin-overlay" style="display:none;">
  <div id="admin-modal">
    <h2>Arcade Admin</h2>
    <div class="admin-grid">
      <div class="admin-label">Contract</div>
      <div class="admin-value" id="admin-contract-id">-</div>

      <div class="admin-label">Current Fee</div>
      <div class="admin-value" id="admin-fee-current">-</div>

      <div class="admin-label">Set Fee (STX)</div>
      <div class="admin-value">
        <input id="admin-fee-stx-input" type="text" inputmode="decimal" placeholder="0.03" />
        <button id="admin-fee-apply">Set Fee</button>
      </div>

      <div class="admin-label">Verifier Hash</div>
      <div class="admin-value" id="admin-verifier-current">-</div>

      <div class="admin-label">Set Verifier Hash</div>
      <div class="admin-value">
        <input id="admin-verifier-input" type="text" maxlength="40" placeholder="40 hex chars or blank" />
        <button id="admin-verifier-apply">Set</button>
        <button id="admin-verifier-clear">Clear</button>
      </div>
    </div>
    <div id="admin-status" class="admin-status"></div>
    <div class="admin-actions">
      <button id="admin-refresh">Refresh</button>
      <button id="admin-close">Close</button>
    </div>
  </div>
</div>

<script src="lib/utils.js"></script>
<script>
  var arcadeDebugEnabled = false;
  try{
    var arcadeParams = new URLSearchParams(window.location.search || '');
    arcadeDebugEnabled =
      arcadeParams.get('debug') === '1' ||
      arcadeParams.get('arcadeDebug') === '1';
  }catch(e){}
  if(window.ARCADE_ONCHAIN_CONFIG && window.ARCADE_ONCHAIN_CONFIG.debug === true){
    arcadeDebugEnabled = true;
  }

  // Configure this after deploy to enable on-chain Top 10 verification.
  // Top 10 is on-chain only. Local storage keeps personal bests only.
  // Wallet-only v1.3 default:
  // - contractName: 'xtrata-arcade-scores-v1-3'
  // - requiresAttestation: false
  // - attestationEndpoint: ''
  // Strict fee trust mode:
  // - useDenyModePostConditions: true
  // - fallbackToAllowModeOnPostConditionFailure: false
  window.ARCADE_ONCHAIN_CONFIG = window.ARCADE_ONCHAIN_CONFIG || {
    enabled: true,
    network: 'mainnet',
    contractAddress: 'SP3JNSEXAZP4BDSHV0DN3M8R3P0MY0EEBQQZX743X',
    contractName: 'xtrata-arcade-scores-v1-3',
    functionName: 'submit-score',
    leaderboardFunctionName: 'get-top10',
    apiBaseUrl: '/hiro/mainnet',
    apiFallbackBaseUrls: ['https://api.mainnet.hiro.so'],
    readSenderAddress: '',
    requiresAttestation: false,
    attestationEndpoint: '',
    attestationTimeoutMs: 10000,
    minRank: 10,
    useDenyModePostConditions: true,
    fallbackToAllowModeOnPostConditionFailure: false,
    debug: arcadeDebugEnabled
  };
  window.ARCADE_ONCHAIN_CONFIG.debug = arcadeDebugEnabled;
  window.ARCADE_ONCHAIN_DEBUG = arcadeDebugEnabled;
  window.ARCADE_MAIN_SCRIPT = 'main.js?v=wallet-debug-2026-02-20-12';
</script>
<script src="lib/highscores.js?v=wallet-debug-2026-02-20-18"></script>
<script src="games/latest-manifest.js"></script>
<script src="lib/game-loader.js?v=game-loader-2026-02-20-01"></script>
</body>
</html>
