<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astro Blaster - On-Chain</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #050816; color: #d6e7ff; }
    #loader-panel { padding: 10px 12px; border-bottom: 1px solid #1d2c47; background: #0a1223; overflow: hidden; transition: opacity 0.22s ease, max-height 0.22s ease, padding 0.22s ease, border-width 0.22s ease; max-height: 240px; opacity: 1; }
    #loader-panel.is-hidden { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom-width: 0; }
    #loader-title { font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; color: #9fc2ff; }
    #loader-log { margin: 8px 0 0; max-height: 130px; overflow: auto; font-size: 12px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; color: #9ec6ff; }
    #loader-panel.is-hidden #loader-log { max-height: 0; margin-top: 0; }
  </style>
</head>
<body>
  <div id="loader-panel">
    <div id="loader-title">Astro Blaster Recursive Loader</div>
    <pre id="loader-log"></pre>
  </div>

  <div id="top-bar">
    <span id="title">Astro Blaster</span>
    <div id="top-bar-right">
      <span id="wallet-status-badge" class="wallet-status-badge is-loading" aria-live="polite">Wallet: checking...</span>
      <button id="wallet-connect-btn" title="Connect wallet">Connect</button>
      <button id="wallet-disconnect-btn" title="Disconnect wallet" style="display:none;">Disconnect</button>
      <button id="force-next-wave-btn" title="Force next wave/level for testing" style="display:none;">Next Wave</button>
      <button id="sound-toggle" title="Toggle Sound">Sound</button>
      <button id="exit-btn" style="display:none;">Exit</button>
    </div>
  </div>

  <div id="app">
    <div id="home-grid" style="display:none;"></div>
    <div id="game-container"></div>
  </div>

  <div id="error-overlay" style="display:none;">
    <div id="error-box">
      <h2>Game Error</h2>
      <p id="error-msg"></p>
      <button id="error-close">Return to Start Screen</button>
    </div>
  </div>

  <script>
    (function () {
      if (window.__astroBlasterStandaloneParentStarted) return;
      window.__astroBlasterStandaloneParentStarted = true;

      var CONFIG = {
        contentContractAddress: 'SP3JNSEXAZP4BDSHV0DN3M8R3P0MY0EEBQQZX743X',
        contentContractName: 'xtrata-v2-1-0',
        senderAddress: 'SP3JNSEXAZP4BDSHV0DN3M8R3P0MY0EEBQQZX743X',
        networkPriority: ['mainnet'],
        maxChunksPerModule: 512,

        moduleIds: {
          styles: 69,
          utils: 70,
          highscores: 80,
          gameRuntime: 71,
          main: 87
        },

        scoreConfig: {
          enabled: true,
          network: 'mainnet',
          contractAddress: 'SP3JNSEXAZP4BDSHV0DN3M8R3P0MY0EEBQQZX743X',
          contractName: 'xtrata-arcade-scores-v1-3',
          functionName: 'submit-score',
          leaderboardFunctionName: 'get-top10',
          apiBaseUrl: '/hiro/mainnet',
          apiFallbackBaseUrls: ["https://api.mainnet.hiro.so"],
          readSenderAddress: '',
          requiresAttestation: false,
          attestationEndpoint: '',
          attestationTimeoutMs: 10000,
          minRank: 10,
          useDenyModePostConditions: true,
          fallbackToAllowModeOnPostConditionFailure: false,
          debug: false
        }
      };

      var NETWORK_BASE = {
        mainnet: ['/hiro/mainnet', 'https://api.mainnet.hiro.so'],
        testnet: ['/hiro/testnet', 'https://api.testnet.hiro.so']
      };

      var MODULES = [
        { key: 'styles', id: Number(CONFIG.moduleIds.styles || 0), mimeType: 'text/css' },
        { key: 'utils', id: Number(CONFIG.moduleIds.utils || 0), mimeType: 'text/javascript' },
        { key: 'highscores', id: Number(CONFIG.moduleIds.highscores || 0), mimeType: 'text/javascript' },
        { key: 'game-runtime', id: Number(CONFIG.moduleIds.gameRuntime || 0), mimeType: 'text/javascript' },
        { key: 'main', id: Number(CONFIG.moduleIds.main || 0), mimeType: 'text/javascript' }
      ];

      var loaderPanel = document.getElementById('loader-panel');
      var loaderLog = document.getElementById('loader-log');
      var startMs = Date.now();
      var HOST_WALLET_BRIDGE = {
        requestType: 'xtrata:wallet:request',
        responseType: 'xtrata:wallet:response',
        intentType: 'xtrata:arcade:wallet-intent',
        token: '',
        pending: {},
        seq: 0,
        listenerReady: false,
        session: null,
        providerShimInstalled: false
      };
      var HOST_WALLET_SHIM_METHODS = [
        'stx_getAddresses',
        'getAddresses',
        'stx_getAccounts',
        'getAccounts',
        'wallet_getAccount',
        'stx_getNetwork',
        'getNetwork',
        'stx_requestAccounts',
        'requestAccounts',
        'stx_connect',
        'connect',
        'wallet_connect',
        'stx_callContract',
        'stx_callContractV2',
        'stx_disconnect',
        'wallet_disconnect',
        'disconnect',
        'deactivate'
      ];

      function keepLoaderVisible() {
        try {
          if (typeof window === 'undefined' || !window.location) return false;
          var params = new URLSearchParams(window.location.search || '');
          return params.get('loader') === '1';
        } catch (error) {
          return false;
        }
      }

      function resolveRuntimeDebugEnabled() {
        var enabled = !!(
          window.ARCADE_ONCHAIN_CONFIG &&
          window.ARCADE_ONCHAIN_CONFIG.debug === true
        );
        try {
          var params = new URLSearchParams(window.location.search || '');
          if (params.get('debug') === '1' || params.get('arcadeDebug') === '1') {
            enabled = true;
          }
        } catch (error) {}
        return enabled;
      }

      function hideLoaderPanelAfterBoot() {
        if (keepLoaderVisible()) {
          log('Loader pinned via ?loader=1');
          return;
        }
        if (!loaderPanel) return;
        loaderPanel.classList.add('is-hidden');
        setTimeout(function () {
          if (loaderPanel && loaderPanel.parentNode) {
            loaderPanel.style.display = 'none';
          }
        }, 260);
      }

      function log(message) {
        var line = '[+' + String(Date.now() - startMs).padStart(5, ' ') + 'ms] ' + String(message);
        if (typeof console !== 'undefined' && typeof console.log === 'function') {
          console.log(line);
        }
        if (loaderLog) {
          loaderLog.textContent += line + '\n';
        }
      }

      function getHostWalletBridgeToken() {
        try {
          var params = new URLSearchParams(window.location.search || '');
          return String(params.get('walletBridgeToken') || '').trim();
        } catch (error) {
          return '';
        }
      }

      function getHostWalletBridgeTargets() {
        var out = [];
        if (window.opener && window.opener !== window) {
          out.push(window.opener);
        }
        if (window.parent && window.parent !== window) {
          out.push(window.parent);
        }
        if (window.top && window.top !== window && out.indexOf(window.top) < 0) {
          out.push(window.top);
        }
        return out;
      }

      function hasHostWalletBridge() {
        return !!HOST_WALLET_BRIDGE.token && getHostWalletBridgeTargets().length > 0;
      }

      function emitHostWalletIntent(intent, payload) {
        var targets = getHostWalletBridgeTargets();
        if (!targets.length) return;
        var message = {
          type: HOST_WALLET_BRIDGE.intentType,
          intent: String(intent || ''),
          payload: payload || {},
          bridgeToken: HOST_WALLET_BRIDGE.token || ''
        };
        var i;
        for (i = 0; i < targets.length; i += 1) {
          try {
            targets[i].postMessage(message, window.location.origin);
          } catch (error) {}
        }
      }

      function createHostWalletBridgeError(message, code) {
        var error = new Error(String(message || 'Host wallet bridge request failed.'));
        if (typeof code !== 'undefined') {
          error.code = code;
        }
        return error;
      }

      function ensureHostWalletBridgeListener() {
        if (HOST_WALLET_BRIDGE.listenerReady) return;
        HOST_WALLET_BRIDGE.listenerReady = true;
        window.addEventListener('message', function (event) {
          var data = event && event.data ? event.data : null;
          if (!data || data.type !== HOST_WALLET_BRIDGE.responseType) {
            return;
          }
          if (event.origin !== window.location.origin) {
            return;
          }
          var requestId = typeof data.requestId === 'string' ? data.requestId : '';
          if (!requestId || !HOST_WALLET_BRIDGE.pending[requestId]) {
            return;
          }
          var entry = HOST_WALLET_BRIDGE.pending[requestId];
          delete HOST_WALLET_BRIDGE.pending[requestId];
          clearTimeout(entry.timer);
          if (data.ok) {
            entry.resolve(data.result);
            return;
          }
          var detail = data.error || {};
          var message =
            detail && detail.message
              ? String(detail.message)
              : 'Host wallet bridge rejected request.';
          var error = createHostWalletBridgeError(message);
          if (detail && typeof detail.code === 'number') {
            error.code = detail.code;
          }
          entry.reject(error);
        });
      }

      function requestHostWalletBridge(method, params, timeoutMs) {
        if (!HOST_WALLET_BRIDGE.token) {
          return Promise.reject(
            createHostWalletBridgeError('Host wallet bridge token missing.', -32001)
          );
        }
        var targets = getHostWalletBridgeTargets();
        if (!targets.length) {
          return Promise.reject(
            createHostWalletBridgeError('Host wallet bridge target unavailable.', -32001)
          );
        }

        ensureHostWalletBridgeListener();

        return new Promise(function (resolve, reject) {
          var requestId = 'astro-wallet-' + String(++HOST_WALLET_BRIDGE.seq);
          var timer = setTimeout(function () {
            if (HOST_WALLET_BRIDGE.pending[requestId]) {
              delete HOST_WALLET_BRIDGE.pending[requestId];
            }
            reject(
              createHostWalletBridgeError(
                'Host wallet bridge request timed out for ' + method + '.',
                -32001
              )
            );
          }, Math.max(3000, Number(timeoutMs || 90000)));

          HOST_WALLET_BRIDGE.pending[requestId] = {
            resolve: resolve,
            reject: reject,
            timer: timer
          };

          var message = {
            type: HOST_WALLET_BRIDGE.requestType,
            requestId: requestId,
            bridgeToken: HOST_WALLET_BRIDGE.token,
            method: method,
            params: typeof params === 'undefined' ? null : params
          };

          var sent = false;
          var i;
          for (i = 0; i < targets.length; i += 1) {
            try {
              targets[i].postMessage(message, window.location.origin);
              sent = true;
            } catch (error) {}
          }

          if (!sent) {
            clearTimeout(timer);
            delete HOST_WALLET_BRIDGE.pending[requestId];
            reject(
              createHostWalletBridgeError('Host wallet bridge postMessage failed.', -32001)
            );
          }
        });
      }

      function normalizeHostWalletNetwork(value, fallback) {
        if (typeof value === 'string') {
          var lower = value.toLowerCase();
          if (lower.indexOf('mainnet') >= 0 || lower === 'main') return 'mainnet';
          if (lower.indexOf('testnet') >= 0 || lower === 'test') return 'testnet';
        } else if (value && typeof value === 'object') {
          if (typeof value.network === 'string') {
            return normalizeHostWalletNetwork(value.network, fallback);
          }
          if (typeof value.name === 'string') {
            return normalizeHostWalletNetwork(value.name, fallback);
          }
          if (typeof value.id === 'string') {
            return normalizeHostWalletNetwork(value.id, fallback);
          }
        }
        if (typeof fallback === 'string' && fallback) {
          return fallback;
        }
        return 'mainnet';
      }

      function parseHostWalletRequestArgs(methodOrPayload, maybeParams) {
        if (typeof methodOrPayload === 'string') {
          return { method: methodOrPayload, params: maybeParams };
        }
        if (methodOrPayload && typeof methodOrPayload === 'object') {
          return {
            method: methodOrPayload.method,
            params: typeof methodOrPayload.params === 'undefined' ? maybeParams : methodOrPayload.params
          };
        }
        return { method: '', params: maybeParams };
      }

      function isHostWalletConnectMethod(method) {
        return (
          method === 'stx_requestAccounts' ||
          method === 'requestAccounts' ||
          method === 'stx_connect' ||
          method === 'connect' ||
          method === 'wallet_connect'
        );
      }

      function isHostWalletReadMethod(method) {
        return (
          method === 'stx_getAddresses' ||
          method === 'getAddresses' ||
          method === 'stx_getAccounts' ||
          method === 'getAccounts' ||
          method === 'wallet_getAccount'
        );
      }

      function isHostWalletNetworkMethod(method) {
        return method === 'stx_getNetwork' || method === 'getNetwork';
      }

      function isHostWalletDisconnectMethod(method) {
        return (
          method === 'stx_disconnect' ||
          method === 'wallet_disconnect' ||
          method === 'disconnect' ||
          method === 'deactivate'
        );
      }

      function isHostWalletContractCallMethod(method) {
        return method === 'stx_callContract' || method === 'stx_callContractV2';
      }

      function isHostWalletBridgeUnavailableError(error) {
        if (!error) return false;
        if (typeof error.code !== 'undefined' && Number(error.code) === -32001) {
          return true;
        }
        var message = error && error.message ? String(error.message).toLowerCase() : '';
        return (
          message.indexOf('host wallet bridge') >= 0 ||
          message.indexOf('bridge token') >= 0 ||
          message.indexOf('bridge target') >= 0
        );
      }

      function resolveHostWalletSessionFromPayload(payload, preferredNetwork) {
        var preferred = normalizeHostWalletNetwork(
          preferredNetwork,
          CONFIG.scoreConfig.network || 'mainnet'
        );
        var address = pickStacksAddress(collectStacksAddresses(payload, [], 0), preferred);
        if (!address) {
          address = pickStacksAddress(collectStacksAddresses(payload, [], 0), null);
        }
        if (!address) {
          return null;
        }
        var network = normalizeHostWalletNetwork(
          payload && payload.network,
          networkFromAddress(address) || preferred
        );
        return {
          address: address,
          network: network
        };
      }

      function applyHostWalletSessionFromPayload(payload, preferredNetwork) {
        var session = resolveHostWalletSessionFromPayload(payload, preferredNetwork);
        if (session) {
          HOST_WALLET_BRIDGE.session = session;
        }
        return HOST_WALLET_BRIDGE.session;
      }

      function buildHostWalletSessionResponse(session, fallbackNetwork) {
        var network = normalizeHostWalletNetwork(
          session && session.network,
          fallbackNetwork || CONFIG.scoreConfig.network || 'mainnet'
        );
        if (!session || !looksLikeStacksAddress(session.address)) {
          return {
            addresses: [],
            accounts: [],
            network: network
          };
        }
        var address = String(session.address).trim();
        var stxAddress = network === 'testnet'
          ? { testnet: address }
          : { mainnet: address };
        return {
          address: address,
          selectedAddress: address,
          identityAddress: address,
          addresses: [address],
          accounts: [address],
          stxAddress: stxAddress,
          network: network
        };
      }

      function resolveHostWalletRequestNetwork(params, fallback) {
        if (params && typeof params === 'object') {
          return normalizeHostWalletNetwork(params.network, fallback);
        }
        if (typeof params === 'string') {
          return normalizeHostWalletNetwork(params, fallback);
        }
        return normalizeHostWalletNetwork(fallback, CONFIG.scoreConfig.network || 'mainnet');
      }

      function hostWalletShimRequest(methodName, params) {
        var method = String(methodName || '').trim();
        if (!method) {
          return Promise.reject(
            createHostWalletBridgeError('Wallet request method is required.', -32600)
          );
        }

        var fallbackNetwork = normalizeHostWalletNetwork(
          CONFIG.scoreConfig.network,
          'mainnet'
        );
        var requestedNetwork = resolveHostWalletRequestNetwork(params, fallbackNetwork);

        if (isHostWalletDisconnectMethod(method)) {
          var disconnectRequest = hasHostWalletBridge()
            ? requestHostWalletBridge(method, params, 45000)
            : Promise.reject(
                createHostWalletBridgeError('Host wallet bridge unavailable.', -32001)
              );
          return disconnectRequest
            .catch(function (error) {
              if (!isHostWalletBridgeUnavailableError(error)) {
                throw error;
              }
              return null;
            })
            .then(function () {
              HOST_WALLET_BRIDGE.session = null;
              return { ok: true };
            });
        }

        if (isHostWalletConnectMethod(method)) {
          if (!hasHostWalletBridge()) {
            return Promise.reject(
              createHostWalletBridgeError(
                'Host wallet bridge unavailable. Open this game from inside Xtrata runtime.',
                -32001
              )
            );
          }
          return requestHostWalletBridge(method, params, 120000).then(function (payload) {
            applyHostWalletSessionFromPayload(payload, requestedNetwork);
            return buildHostWalletSessionResponse(
              HOST_WALLET_BRIDGE.session,
              requestedNetwork
            );
          });
        }

        if (isHostWalletReadMethod(method)) {
          if (!hasHostWalletBridge()) {
            return Promise.resolve(
              buildHostWalletSessionResponse(HOST_WALLET_BRIDGE.session, requestedNetwork)
            );
          }
          return requestHostWalletBridge(method, params, 45000)
            .then(function (payload) {
              applyHostWalletSessionFromPayload(payload, requestedNetwork);
              return buildHostWalletSessionResponse(
                HOST_WALLET_BRIDGE.session,
                requestedNetwork
              );
            })
            .catch(function (error) {
              if (!isHostWalletBridgeUnavailableError(error)) {
                throw error;
              }
              return buildHostWalletSessionResponse(
                HOST_WALLET_BRIDGE.session,
                requestedNetwork
              );
            });
        }

        if (isHostWalletNetworkMethod(method)) {
          if (!hasHostWalletBridge()) {
            return Promise.resolve({
              network: normalizeHostWalletNetwork(
                HOST_WALLET_BRIDGE.session && HOST_WALLET_BRIDGE.session.network,
                requestedNetwork
              )
            });
          }
          return requestHostWalletBridge(method, params, 45000).then(function (payload) {
            var network = normalizeHostWalletNetwork(
              payload && payload.network,
              payload && payload.result && payload.result.network
                ? payload.result.network
                : requestedNetwork
            );
            if (HOST_WALLET_BRIDGE.session && HOST_WALLET_BRIDGE.session.address) {
              HOST_WALLET_BRIDGE.session.network = network;
            }
            return { network: network };
          });
        }

        if (isHostWalletContractCallMethod(method)) {
          if (!hasHostWalletBridge()) {
            return Promise.reject(
              createHostWalletBridgeError(
                'Wallet contract call requires host wallet bridge support.',
                -32601
              )
            );
          }
          return requestHostWalletBridge(
            method === 'stx_callContractV2' ? 'stx_callContract' : method,
            params,
            180000
          );
        }

        return Promise.reject(
          createHostWalletBridgeError(
            'Wallet method unsupported in host bridge shim: ' + method,
            -32601
          )
        );
      }

      function networkFromAddress(address) {
        if (typeof address !== 'string' || address.length < 2) return null;
        var prefix = address.substring(0, 2);
        if (prefix === 'SP' || prefix === 'SM') return 'mainnet';
        if (prefix === 'ST' || prefix === 'SN') return 'testnet';
        return null;
      }

      function looksLikeStacksAddress(address) {
        if (typeof address !== 'string') return false;
        var trimmed = address.trim();
        if (trimmed.length < 20) return false;
        return networkFromAddress(trimmed) !== null;
      }

      function collectStacksAddresses(payload, out, depth) {
        if (!payload || depth > 8) return out;
        if (typeof payload === 'string') {
          if (looksLikeStacksAddress(payload)) {
            out.push(payload.trim());
          }
          return out;
        }
        if (Array.isArray(payload)) {
          var i;
          for (i = 0; i < payload.length; i += 1) {
            collectStacksAddresses(payload[i], out, depth + 1);
          }
          return out;
        }
        if (typeof payload !== 'object') return out;

        collectStacksAddresses(payload.address, out, depth + 1);
        collectStacksAddresses(payload.selectedAddress, out, depth + 1);
        collectStacksAddresses(payload.identityAddress, out, depth + 1);
        collectStacksAddresses(payload.addresses, out, depth + 1);
        collectStacksAddresses(payload.accounts, out, depth + 1);
        collectStacksAddresses(payload.stxAddress, out, depth + 1);
        collectStacksAddresses(payload.result, out, depth + 1);
        if (payload.stxAddress && typeof payload.stxAddress === 'object') {
          collectStacksAddresses(payload.stxAddress.mainnet, out, depth + 1);
          collectStacksAddresses(payload.stxAddress.testnet, out, depth + 1);
        }
        return out;
      }

      function pickStacksAddress(candidates, network) {
        if (!Array.isArray(candidates) || !candidates.length) return null;
        var deduped = [];
        var seen = {};
        var i;
        for (i = 0; i < candidates.length; i += 1) {
          var candidate = String(candidates[i] || '').trim();
          if (!looksLikeStacksAddress(candidate)) continue;
          if (seen[candidate]) continue;
          seen[candidate] = true;
          deduped.push(candidate);
        }
        if (!deduped.length) return null;
        if (network) {
          for (i = 0; i < deduped.length; i += 1) {
            if (networkFromAddress(deduped[i]) === network) {
              return deduped[i];
            }
          }
        }
        return deduped[0];
      }

      function sanitizeAscii(input, maxLen, fallback) {
        var raw = input == null ? '' : String(input);
        var out = '';
        var i;
        for (i = 0; i < raw.length; i += 1) {
          var code = raw.charCodeAt(i);
          if (code >= 32 && code <= 126) {
            out += raw.charAt(i);
            if (out.length >= maxLen) break;
          }
        }
        if (out.length === 0) out = fallback || '';
        if (out.length > maxLen) out = out.substring(0, maxLen);
        return out;
      }

      function safePlayerName(input) {
        var name = sanitizeAscii(input, 12, 'AAA');
        if (name.length < 3) {
          name = (name + 'AAA').substring(0, 3);
        }
        return name;
      }

      function safeGameId(input) {
        return sanitizeAscii(input, 32, 'unknown_game');
      }

      function toModeUint(mode) {
        return mode === 'time' ? 1 : 0;
      }

      function encodeUIntCv(value) {
        return uintToCvHex(value);
      }

      function encodeAsciiCv(value) {
        var text = String(value == null ? '' : value);
        var hex = '';
        var i;
        for (i = 0; i < text.length; i += 1) {
          var code = text.charCodeAt(i);
          if (code < 0 || code > 127) {
            throw new Error('Contract call string must be ASCII.');
          }
          var byteHex = code.toString(16);
          if (byteHex.length < 2) byteHex = '0' + byteHex;
          hex += byteHex;
        }
        var lenHex = text.length.toString(16);
        while (lenHex.length < 8) lenHex = '0' + lenHex;
        return '0x0d' + lenHex + hex;
      }

      function encodeBufferCv(hexValue) {
        var clean = String(hexValue == null ? '' : hexValue)
          .replace(/^0x/i, '')
          .toLowerCase();
        if (!clean || clean.length % 2 !== 0 || /[^0-9a-f]/.test(clean)) {
          throw new Error('Contract call buffer must be a valid hex string.');
        }
        var byteLen = clean.length / 2;
        var lenHex = byteLen.toString(16);
        while (lenHex.length < 8) lenHex = '0' + lenHex;
        return '0x02' + lenHex + clean;
      }

      function buildSubmitFunctionArgs(payload) {
        var args = [
          encodeAsciiCv(safeGameId(payload.gameId)),
          encodeUIntCv(toModeUint(payload.mode)),
          encodeUIntCv(payload.score),
          encodeAsciiCv(safePlayerName(payload.playerName))
        ];

        var attestation = payload && payload.attestation ? payload.attestation : null;
        if (attestation) {
          args.push(encodeUIntCv(attestation.nonce));
          args.push(encodeUIntCv(attestation.expiresAt));
          args.push(encodeBufferCv(attestation.signatureHex || attestation.signature_hex || attestation.signature || ''));
        }
        return args;
      }

      function collectApiBaseCandidates(payload) {
        var out = [];
        function push(value) {
          var normalized = String(value || '').trim().replace(/\/+$/, '');
          if (!normalized) return;
          if (out.indexOf(normalized) >= 0) return;
          out.push(normalized);
        }

        var network = String((payload && payload.network) || CONFIG.scoreConfig.network || 'mainnet').toLowerCase();
        push(payload && payload.apiBaseUrl);
        if (NETWORK_BASE[network]) {
          var baseList = NETWORK_BASE[network];
          if (Array.isArray(baseList)) {
            var i;
            for (i = 0; i < baseList.length; i += 1) {
              push(baseList[i]);
            }
          }
        }
        if (payload && Array.isArray(payload.apiFallbackBaseUrls)) {
          var j;
          for (j = 0; j < payload.apiFallbackBaseUrls.length; j += 1) {
            push(payload.apiFallbackBaseUrls[j]);
          }
        }

        return out;
      }

      function decodeReadOnlyUIntResult(resultHex, functionName) {
        var bytes = hexToBytes(resultHex);
        while (bytes.length > 0 && (bytes[0] === 0x07 || bytes[0] === 0x0a)) {
          bytes = bytes.slice(1);
        }
        if (!bytes.length || bytes[0] !== 0x01 || bytes.length < 17) {
          throw new Error(functionName + ' did not return an unsigned integer.');
        }
        var value = 0n;
        var i;
        for (i = 1; i <= 16; i += 1) {
          value = (value << 8n) + BigInt(bytes[i]);
        }
        return value.toString(10);
      }

      async function callScoreReadOnly(payload, functionName, args, senderAddress) {
        var bases = collectApiBaseCandidates(payload);
        if (!bases.length) {
          throw new Error('No API base URL available for score read-only call.');
        }
        var sender =
          String(senderAddress || '').trim() ||
          String((payload && payload.readSenderAddress) || '').trim() ||
          CONFIG.senderAddress;
        var i;
        var lastError = null;
        for (i = 0; i < bases.length; i += 1) {
          var endpoint =
            bases[i] +
            '/v2/contracts/call-read/' +
            String(payload.contractAddress) + '/' +
            String(payload.contractName) + '/' +
            functionName;
          try {
            var response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                sender: sender,
                arguments: Array.isArray(args) ? args : []
              })
            });
            if (!response.ok) {
              throw new Error('Read-only call failed with HTTP ' + response.status + '.');
            }
            var body = await response.json();
            if (!body || body.okay !== true || typeof body.result !== 'string') {
              throw new Error(body && body.cause ? String(body.cause) : 'Read-only call failed.');
            }
            return body.result;
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error('Read-only score call failed.');
      }

      async function resolveFeePostConditionConfig(payload, walletAddress) {
        if (!payload || !payload.useDenyModePostConditions) {
          return { postConditionMode: 'allow' };
        }
        var feeHex = await callScoreReadOnly(payload, 'get-fee-unit', [], walletAddress);
        var feeUnit = decodeReadOnlyUIntResult(feeHex, 'get-fee-unit');
        return {
          postConditionMode: 'deny',
          postConditions: [{
            type: 'stx',
            address: walletAddress,
            amount: feeUnit,
            condition: 'less_equal'
          }]
        };
      }

      function extractTxId(result) {
        if (!result || typeof result !== 'object') return null;
        return (
          result.txId ||
          result.txid ||
          result.tx_id ||
          (result.result && (result.result.txId || result.result.txid || result.result.tx_id)) ||
          null
        );
      }

      async function submitScoreViaHostWalletBridge(payload) {
        if (!hasHostWalletBridge()) {
          throw createHostWalletBridgeError(
            'Host wallet bridge unavailable. Open this game from inside Xtrata runtime.',
            -32001
          );
        }

        payload = payload || {};
        var network = String(payload.network || CONFIG.scoreConfig.network || 'mainnet').toLowerCase();

        emitHostWalletIntent('score.submit.requested', {
          gameId: safeGameId(payload.gameId),
          mode: payload.mode === 'time' ? 'time' : 'score',
          score: Number(payload.score || 0),
          network: network,
          contractAddress: payload.contractAddress,
          contractName: payload.contractName
        });

        var walletSession = await requestHostWalletBridge(
          'stx_requestAccounts',
          { network: network },
          120000
        );
        var walletAddress = pickStacksAddress(
          collectStacksAddresses(walletSession, [], 0),
          network
        );
        if (!walletAddress) {
          throw new Error('Unable to resolve wallet address from host bridge.');
        }

        if (payload.requiresAttestation && !payload.attestation) {
          throw new Error('This score submit requires attestation before sending the transaction.');
        }

        var args = buildSubmitFunctionArgs(payload);
        var strictConfig;
        try {
          strictConfig = await resolveFeePostConditionConfig(payload, walletAddress);
        } catch (error) {
          if (payload.fallbackToAllowModeOnPostConditionFailure) {
            strictConfig = { postConditionMode: 'allow' };
          } else {
            throw error;
          }
        }

        var callParams = {
          contractAddress: String(payload.contractAddress || ''),
          contractName: String(payload.contractName || ''),
          functionName: String(payload.functionName || 'submit-score'),
          functionArgs: args,
          network: network,
          postConditionMode: strictConfig.postConditionMode || 'allow',
          postConditions: strictConfig.postConditions
        };

        var txResult = await requestHostWalletBridge(
          'stx_callContract',
          callParams,
          180000
        );
        var txId = extractTxId(txResult);
        emitHostWalletIntent('score.submit.submitted', {
          gameId: safeGameId(payload.gameId),
          mode: payload.mode === 'time' ? 'time' : 'score',
          score: Number(payload.score || 0),
          walletAddress: walletAddress,
          txId: txId
        });
        return {
          txId: txId,
          raw: txResult
        };
      }

      function installHostWalletBridgeProviderShim() {
        if (HOST_WALLET_BRIDGE.providerShimInstalled) return;
        HOST_WALLET_BRIDGE.token = getHostWalletBridgeToken();
        if (!hasHostWalletBridge()) return;
        HOST_WALLET_BRIDGE.providerShimInstalled = true;

        if (!window.StacksProvider || typeof window.StacksProvider !== 'object') {
          window.StacksProvider = {};
        }
        if (!window.stacks || typeof window.stacks !== 'object') {
          window.stacks = window.StacksProvider;
        }

        function patchProvider(provider, label) {
          if (!provider || typeof provider !== 'object') return;
          if (provider.__xtrataHostWalletBridgeShim) return;

          var originalRequest =
            typeof provider.request === 'function'
              ? provider.request.bind(provider)
              : null;

          provider.request = function (methodOrPayload, maybeParams) {
            var parsed = parseHostWalletRequestArgs(methodOrPayload, maybeParams);
            var method = typeof parsed.method === 'string' ? parsed.method.trim() : '';
            if (!method) {
              return Promise.reject(
                createHostWalletBridgeError('Wallet request method is required.', -32600)
              );
            }

            if (HOST_WALLET_SHIM_METHODS.indexOf(method) >= 0) {
              return hostWalletShimRequest(method, parsed.params);
            }

            if (originalRequest) {
              return Promise.resolve(originalRequest(methodOrPayload, maybeParams));
            }

            return Promise.reject(
              createHostWalletBridgeError(
                'Wallet method unsupported in provider shim: ' + method,
                -32601
              )
            );
          };

          var i;
          for (i = 0; i < HOST_WALLET_SHIM_METHODS.length; i += 1) {
            (function (methodName) {
              provider[methodName] = function (params) {
                return provider.request(methodName, params);
              };
            })(HOST_WALLET_SHIM_METHODS[i]);
          }

          try {
            provider.__xtrataHostWalletBridgeShim = true;
            provider.__arcadeWalletLabel = provider.__arcadeWalletLabel || label;
          } catch (error) {}
        }

        patchProvider(window.StacksProvider, 'window.StacksProvider');
        patchProvider(window.stacks, 'window.stacks');
        patchProvider(window.LeatherProvider, 'window.LeatherProvider');
        patchProvider(window.XverseProviders && window.XverseProviders.StacksProvider, 'window.XverseProviders.StacksProvider');
        patchProvider(window.xverseProviders && window.xverseProviders.StacksProvider, 'window.xverseProviders.StacksProvider');

        emitHostWalletIntent('bridge.provider-shim-ready', {
          app: 'astro-blaster-standalone',
          mode: 'wallet-provider-shim-v1'
        });
        log('Host wallet bridge provider shim installed.');
      }

      function installHostWalletBridgeSubmitter() {
        HOST_WALLET_BRIDGE.token = getHostWalletBridgeToken();
        if (!hasHostWalletBridge()) {
          log('Host wallet bridge unavailable in this runtime context; default wallet flow remains active.');
          return;
        }
        var existing =
          window.ArcadeOnChain && typeof window.ArcadeOnChain === 'object'
            ? window.ArcadeOnChain
            : {};
        existing.submitScore = submitScoreViaHostWalletBridge;
        existing.__xtrataHostWalletBridge = {
          mode: 'score-submit-v1',
          tokenAttached: true
        };
        window.ArcadeOnChain = existing;
        emitHostWalletIntent('bridge.ready', {
          app: 'astro-blaster-standalone',
          mode: 'score-submit-v1'
        });
        log('Host wallet bridge enabled for on-chain score submits.');
      }

      function uintToCvHex(value) {
        var n = BigInt(value);
        if (n < 0n) throw new Error('uint cannot be negative');
        return '0x01' + n.toString(16).padStart(32, '0');
      }

      function hexToBytes(hex) {
        var clean = String(hex || '').replace(/^0x/i, '');
        if (clean.length % 2 !== 0) throw new Error('Invalid hex length');
        var bytes = new Uint8Array(clean.length / 2);
        var i;
        for (i = 0; i < clean.length; i += 2) {
          bytes[i / 2] = parseInt(clean.slice(i, i + 2), 16);
        }
        return bytes;
      }

      function readU32BE(bytes, offset) {
        return ((bytes[offset] << 24) | (bytes[offset + 1] << 16) | (bytes[offset + 2] << 8) | bytes[offset + 3]) >>> 0;
      }

      function decodeBufferCv(cvHex) {
        var bytes = hexToBytes(cvHex);

        while (bytes.length > 0 && (bytes[0] === 0x07 || bytes[0] === 0x0a)) {
          bytes = bytes.slice(1);
        }

        if (!bytes.length || bytes[0] === 0x08 || bytes[0] === 0x09) {
          return new Uint8Array();
        }

        if (bytes[0] !== 0x02) {
          throw new Error('Unexpected Clarity type tag: 0x' + bytes[0].toString(16));
        }

        if (bytes.length < 5) {
          throw new Error('Buffer CV too short');
        }

        var len = readU32BE(bytes, 1);
        var end = 5 + len;
        if (bytes.length < end) {
          throw new Error('Buffer CV truncated');
        }

        return bytes.slice(5, end);
      }

      function concatBytes(chunks) {
        var total = 0;
        var i;
        for (i = 0; i < chunks.length; i += 1) total += chunks[i].length;
        var out = new Uint8Array(total);
        var offset = 0;
        for (i = 0; i < chunks.length; i += 1) {
          out.set(chunks[i], offset);
          offset += chunks[i].length;
        }
        return out;
      }

      function decodeUtf8(bytes) {
        if (typeof TextDecoder !== 'undefined') {
          return new TextDecoder('utf-8').decode(bytes);
        }
        var i;
        var text = '';
        for (i = 0; i < bytes.length; i += 1) text += String.fromCharCode(bytes[i]);
        return decodeURIComponent(escape(text));
      }

      async function callReadOnly(network, fn, args) {
        var rawBases = NETWORK_BASE[network];
        if (!rawBases) throw new Error('Unsupported network: ' + network);
        var bases = Array.isArray(rawBases) ? rawBases : [rawBases];
        var lastError = null;
        var fallbackCount = 0;
        var firstFailedBase = null;
        var i;

        for (i = 0; i < bases.length; i += 1) {
          var base = String(bases[i] || '').trim().replace(/\/+$/, '');
          if (!base) continue;
          var endpoint = base + '/v2/contracts/call-read/' + CONFIG.contentContractAddress + '/' + CONFIG.contentContractName + '/' + fn;
          try {
            var response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sender: CONFIG.senderAddress, arguments: args || [] })
            });

            if (!response.ok) {
              throw new Error('HTTP ' + response.status + ' for ' + fn + ' on ' + network + ' via ' + base);
            }

            if (fallbackCount > 0) {
              log('Read-only fallback summary for ' + fn + ' on ' + network + ': retries=' + fallbackCount + ', firstFailed=' + firstFailedBase + ', selected=' + base + '.');
            }
            return response.json();
          } catch (error) {
            lastError = error;
            if (i + 1 < bases.length) {
              fallbackCount += 1;
              if (!firstFailedBase) {
                firstFailedBase = base;
                log('Read-only fallback triggered for ' + fn + ' on ' + network + '; suppressing repetitive fallback logs.');
              }
            }
          }
        }
        if (fallbackCount > 0) {
          log('Read-only fallback exhausted for ' + fn + ' on ' + network + ': retries=' + fallbackCount + ', firstFailed=' + firstFailedBase + '.');
        }
        throw lastError || new Error('Read-only call failed on all endpoints for ' + network + '.');
      }

      async function fetchModuleBytesOnNetwork(moduleId, network) {
        var chunks = [];
        var index;
        for (index = 0; index < Number(CONFIG.maxChunksPerModule || 512); index += 1) {
          var body = await callReadOnly(network, 'get-chunk', [uintToCvHex(moduleId), uintToCvHex(index)]);

          if (!body || body.okay !== true || typeof body.result !== 'string') {
            if (index === 0) {
              throw new Error(body && body.cause ? String(body.cause) : 'Chunk read failed at index 0 for module ' + moduleId);
            }
            break;
          }

          var bytes = decodeBufferCv(body.result);
          if (!bytes.length) break;
          chunks.push(bytes);
        }

        if (!chunks.length) {
          throw new Error('No chunks loaded for module ' + moduleId + ' on ' + network);
        }

        return concatBytes(chunks);
      }

      async function fetchModuleBytes(moduleId) {
        var networks = Array.isArray(CONFIG.networkPriority) && CONFIG.networkPriority.length
          ? CONFIG.networkPriority.slice()
          : ['mainnet'];
        var i;
        var lastError = null;

        for (i = 0; i < networks.length; i += 1) {
          var network = networks[i];
          try {
            log('Fetching module ' + moduleId + ' from ' + network + '...');
            return await fetchModuleBytesOnNetwork(moduleId, network);
          } catch (error) {
            lastError = error;
            log('Module ' + moduleId + ' failed on ' + network + ': ' + (error && error.message ? error.message : String(error)));
          }
        }

        throw lastError || new Error('Failed to fetch module ' + moduleId);
      }

      function injectModule(module, sourceText) {
        if (module.mimeType === 'text/css') {
          var style = document.createElement('style');
          style.setAttribute('data-module-key', module.key);
          style.textContent = sourceText;
          document.head.appendChild(style);
          return;
        }

        var script = document.createElement('script');
        script.type = 'text/javascript';
        script.setAttribute('data-module-key', module.key);
        script.text = sourceText + '\n//# sourceURL=module-' + module.key + '-' + module.id + '.js';
        document.body.appendChild(script);
      }

      function validateConfig() {
        if (!CONFIG.contentContractAddress || !CONFIG.contentContractName || !CONFIG.senderAddress) {
          throw new Error('Set content contractAddress, contractName, and senderAddress in CONFIG.');
        }
        var i;
        for (i = 0; i < MODULES.length; i += 1) {
          if (!Number.isInteger(MODULES[i].id) || MODULES[i].id <= 0) {
            throw new Error('Set CONFIG.moduleIds.' + MODULES[i].key + ' to a minted inscription id (> 0).');
          }
        }
      }

      async function boot() {
        validateConfig();

        var debugEnabled = resolveRuntimeDebugEnabled();
        CONFIG.scoreConfig.debug = debugEnabled;
        window.ARCADE_ONCHAIN_CONFIG = window.ARCADE_ONCHAIN_CONFIG || CONFIG.scoreConfig;
        if (window.ARCADE_ONCHAIN_CONFIG && typeof window.ARCADE_ONCHAIN_CONFIG === 'object') {
          window.ARCADE_ONCHAIN_CONFIG.debug = debugEnabled;
        }
        window.ARCADE_ONCHAIN_DEBUG = debugEnabled;
        if (debugEnabled) {
          log('Arcade debug logging enabled via URL/config.');
        }

        installHostWalletBridgeProviderShim();
        installHostWalletBridgeSubmitter();

        var i;
        for (i = 0; i < MODULES.length; i += 1) {
          var module = MODULES[i];
          var bytes = await fetchModuleBytes(module.id);
          var text = decodeUtf8(bytes);
          injectModule(module, text);
          log('Loaded module ' + module.key + ' (' + module.id + ')');
        }

        log('All modules loaded. Standalone Astro Blaster should now be running.');
        hideLoaderPanelAfterBoot();
      }

      boot().catch(function (error) {
        log('FATAL: ' + (error && error.message ? error.message : String(error)));
        var errorOverlay = document.getElementById('error-overlay');
        var errorMsg = document.getElementById('error-msg');
        if (errorOverlay && errorMsg) {
          errorMsg.textContent = error && error.message ? error.message : String(error);
          errorOverlay.style.display = 'flex';
        }
      });
    })();
  </script>
</body>
</html>
