<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamplerLab</title>
    <style>
        body { margin: 0; padding: 20px; background: #111; color: #eee; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 980px; }
    </style>
</head>
<body>
    <div id="app-container"></div>

    <script type="module">
        (async () => {
            const t = new URLSearchParams(location.search).get('t') || String(Date.now());
            const mod = await import(`./sampler_lab_boot.js?t=${encodeURIComponent(t)}`);
            await mod.bootSamplerLab({ t });
        })();
    </script>
</body>
</html>
